publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  photo_manager: 3.3.0 # Kita kunci di versi ini biar stabil

dev_dependencies:
