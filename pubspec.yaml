name: re_video_library
description: A Samsung-style video library app.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  video_player: ^2.8.1
  path_provider: ^2.1.2
  permission_handler: ^11.3.0
  device_info_plus: ^10.1.0
  share_plus: ^7.2.2
  intl: ^0.19.0
  photo_manager: ^3.0.0 # Scan video otomatis
  chewie: ^1.7.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: "^0.13.1"

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "icon.png"

flutter:
  uses-material-design: true
