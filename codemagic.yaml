workflows:
  android-workflow:
    name: Re Video Android Workflow
    max_build_duration: 60
    instance_type: mac_mini_m2
    scripts:
      - name: Ultimate Project Repair
        script: |
          # 1. Simpan kode main.dart & pubspec ke memori sementara
          CODE_MAIN=$(cat lib/main.dart)
          CODE_PUB=$(cat pubspec.yaml)
          
          # 2. Hancurkan SEMUA file tanpa sisa (Hard Reset)
          rm -rf *
          rm -rf .??*
          
          # 3. Bikin project baru resmi di folder root
          flutter create --platforms android --project-name re_video_library .
          
          # 4. Tulis ulang file main.dart & pubspec dari memori
          echo "$CODE_PUB" > pubspec.yaml
          echo "$CODE_MAIN" > lib/main.dart
          
          # 5. Ambil library
          flutter pub get
      - name: Build APK (Debug Mode)
        script: |
          # Langsung hajar build tanpa modifikasi aneh-aneh di gradle
          flutter build apk --debug
    artifacts:
      - build/app/outputs/flutter-apk/*.apk
