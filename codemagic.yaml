workflows:
  android-workflow:
    name: Re Video Android Workflow
    max_build_duration: 60
    instance_type: mac_mini_m2
    scripts:
      - name: Hard Reset Project
        script: |
          # 1. Amankan kode lib dan pubspec
          mkdir -p /tmp/fresh_code
          cp -R lib /tmp/fresh_code/
          cp pubspec.yaml /tmp/fresh_code/
          
          # 2. Hapus total semua file di folder project (termasuk folder android yang error)
          rm -rf *
          rm -rf .??*
          
          # 3. Buat ulang project Flutter yang benar-benar baru dan bersih
          flutter create --platforms android --project-name re_video_library .
          
          # 4. Timpa dengan kode lib dan pubspec kamu
          rm -rf lib
          cp -R /tmp/fresh_code/lib .
          cp /tmp/fresh_code/pubspec.yaml .
          
          flutter pub get
      - name: Sync Java Kotlin Target
        script: |
          # Paksa JVM Target ke 17 agar tidak bentrok lagi
          sed -i '' 's/targetCompatibility JavaVersion.VERSION_1_8/targetCompatibility JavaVersion.VERSION_17/g' android/app/build.gradle
          sed -i '' 's/sourceCompatibility JavaVersion.VERSION_1_8/sourceCompatibility JavaVersion.VERSION_17/g' android/app/build.gradle
          echo "tasks.withType(org.jetbrains.kotlin.gradle.tasks.KotlinCompile).configureEach { kotlinOptions { jvmTarget = '17' } }" >> android/app/build.gradle
      - name: Build APK (Debug Mode)
        script: |
          flutter build apk --debug
    artifacts:
      - build/app/outputs/flutter-apk/*.apk
