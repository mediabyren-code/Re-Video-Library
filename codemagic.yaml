workflows:
  android-workflow:
    name: Re Video Android Workflow
    max_build_duration: 60
    instance_type: mac_mini_m2
    scripts:
      - name: Create Fresh Workspace
        script: |
          # 1. Bikin folder baru yang bener-bener bersih di luar repo
          cd /tmp
          flutter create --platforms android --project-name re_video_library hero
          
          # 2. Pindahin kode sakti lo dari repo ke folder baru itu
          cp $FCI_BUILD_DIR/pubspec.yaml /tmp/hero/
          cp -R $FCI_BUILD_DIR/lib/* /tmp/hero/lib/
          
          # 3. Masuk ke folder baru
          cd /tmp/hero
          flutter pub get
          
          # 4. Sinkronisasi Java & Kotlin (Biar gak bentrok lagi)
          sed -i '' 's/targetCompatibility JavaVersion.VERSION_1_8/targetCompatibility JavaVersion.VERSION_17/g' android/app/build.gradle
          sed -i '' 's/sourceCompatibility JavaVersion.VERSION_1_8/sourceCompatibility JavaVersion.VERSION_17/g' android/app/build.gradle
          echo "tasks.withType(org.jetbrains.kotlin.gradle.tasks.KotlinCompile).configureEach { kotlinOptions { jvmTarget = '17' } }" >> android/app/build.gradle
          
          # 5. Jalankan Build di sana
          flutter build apk --debug
          
          # 6. Lempar hasilnya balik ke folder artifacts Codemagic
          cp build/app/outputs/flutter-apk/app-debug.apk $FCI_BUILD_DIR/video-library-debug.apk
    artifacts:
      - "*.apk"
