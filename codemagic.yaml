workflows:
  android-workflow:
    name: Re Video Android Workflow
    max_build_duration: 60
    instance_type: mac_mini_m2
    scripts:
      - name: Ultimate Project Repair & Permission Fix
        script: |
          # 1. Simpan kode
          CODE_MAIN=$(cat lib/main.dart)
          CODE_PUB=$(cat pubspec.yaml)
          
          # 2. Hard Reset
          rm -rf *
          rm -rf .??*
          
          # 3. Bikin project baru
          flutter create --platforms android --project-name re_video_library .
          
          # 4. Tulis ulang kode
          echo "$CODE_PUB" > pubspec.yaml
          echo "$CODE_MAIN" > lib/main.dart
          
          # 5. SUNTIK IZIN KE ANDROID MANIFEST (PENTING!)
          # Kita masukin izin Video & Storage supaya muncul di menu "Izin Aplikasi"
          sed -i '' '/<application/i \
          <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE"/> \
          <uses-permission android:name="android.permission.READ_MEDIA_VIDEO"/> \
          <uses-permission android:name="android.permission.READ_MEDIA_VISUAL_USER_SELECTED"/>' android/app/src/main/src/main/AndroidManifest.xml || \
          sed -i '' '/<application/i \
          <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE"/> \
          <uses-permission android:name="android.permission.READ_MEDIA_VIDEO"/>' android/app/src/main/AndroidManifest.xml

          flutter pub get
      - name: Build APK (Debug Mode)
        script: |
          flutter build apk --debug
    artifacts:
      - build/app/outputs/flutter-apk/*.apk
